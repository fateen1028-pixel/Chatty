<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Basic SEO -->
    <title>Chatty — Secure Real-Time Messaging</title>

    <meta
      name="description"
      content="Chatty is a secure real-time messaging application built by Mohamed Fateen, featuring instant messaging and end-to-end encryption."

    <meta

      content="Chatty, real-time chat, secure messaging, encrypted chat, Mohamed Fateen"
    />

    <meta name="author" content="Mohamed Fateen" />

      property="og:title"
      content="Chatty — Secure Real-Time Messaging"

      name="twitter:description"
