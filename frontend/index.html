<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Metadata -->
    <title>Chatty — Secure Real-Time Messaging</title>
    <meta name="description" content="Chatty is an end-to-end encrypted, real-time messaging application built by Mohamed Fateen for instant, secure communication." />
    <meta name="author" content="Mohamed Fateen" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://chat.fateen.dev/" />

    <!-- PWA / iOS standalone capabilities (Removes clunky browser UI on iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chatty" />

    <!-- Adaptive Theme Colors (Preventing flash bang on theme switch) -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />

    <!-- Asset Paths & Favicons -->
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Unified Social Graphics Metadata (Handles Facebook, LinkedIn, Discord, and Twitter/X) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chat.fateen.dev/" />
    <meta property="og:site_name" content="Chatty" />
    <meta property="og:title" content="Chatty — Secure Real-Time Messaging" />
    <meta property="og:description" content="An end-to-end encrypted real-time messaging platform built by Mohamed Fateen." />
    <meta property="og:image" content="https://chat.fateen.dev/chatty-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Chatty user interface showing secure chat rooms" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Upgraded Structured Data (Fixes search engine intent from generic chat to application) -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "https://chat.fateen.dev/#website",
      "url": "https://chat.fateen.dev/",
      "name": "Chatty",
      "alternateName": [
        "Chatty Messaging",
        "chat.fateen.dev"
      ],
      "description": "A secure end-to-end encrypted real-time messaging application."
    },
    {
      "@type": "WebApplication",
      "@id": "https://chat.fateen.dev/#application",
      "name": "Chatty",
      "url": "https://chat.fateen.dev/",
      "applicationCategory": "CommunicationApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires a modern web browser with JavaScript enabled.",
      "description": "A secure real-time messaging application featuring instant communication and end-to-end encryption.",
      "author": {
        "@type": "Person",
        "name": "Mohamed Fateen",
        "url": "https://fateen.dev/"
      },
      "isPartOf": {
        "@id": "https://chat.fateen.dev/#website"
      }
    }
  ]
}
</script>
  </head>
  <body>
    <!-- Fallback for text-only crawlers or users with JS blocked -->
    <noscript>You need to enable JavaScript to run Chatty.</noscript>
    
    <!-- Application Entry Target -->
    <div id="root"></div>
    
    <!-- Entry Script Bundle -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
