name: Chat Application CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Spring Boot Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/ChatApplicationBackend

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_DB: chat_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres -d chat_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/chat_test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_OPEN_IN_VIEW: "false"

      RESEND_API_KEY: test-api-key
      APP_FRONTEND_URL: http://localhost:5173
      APP_MAIL_FROM: test@example.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          cache-dependency-path: backend/ChatApplicationBackend/pom.xml

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and test backend
        run: ./mvnw --batch-mode clean verify

  frontend:
    name: React Lint and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_URL: http://localhost:8080

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build frontend
        run: npm run build